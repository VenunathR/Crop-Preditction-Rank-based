<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crop Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .container {
            max-width: 600px;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #007bff;
            text-align: center;
        }
        .btn-primary {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Crop Prediction</h1>

    <form id="prediction-form">
        <div class="mb-3">
            <label for="N" class="form-label">Nitrogen (N)</label>
            <input type="number" class="form-control" id="N" min="0" max="140" step="1" required>
        </div>
        <div class="mb-3">
            <label for="P" class="form-label">Phosphorus (P)</label>
            <input type="number" class="form-control" id="P" min="0" max="140" step="1" required>
        </div>
        <div class="mb-3">
            <label for="K" class="form-label">Potassium (K)</label>
            <input type="number" class="form-control" id="K" min="0" max="140" step="1" required>
        </div>

        <div class="mb-3">
            <label for="temperature" class="form-label">Temperature (°C)</label>
            <input type="number" class="form-control" id="temperature" min="0" max="50" step="0.1" required>
        </div>
        <div class="mb-3">
            <label for="humidity" class="form-label">Humidity (%)</label>
            <input type="number" class="form-control" id="humidity" min="0" max="100" step="1" required>
        </div>
        <div class="mb-3">
            <label for="ph" class="form-label">Soil pH</label>
            <input type="number" class="form-control" id="ph" min="0" max="14" step="0.01" required>
        </div>
        <div class="mb-3">
            <label for="rainfall" class="form-label">Rainfall (mm)</label>
            <input type="number" class="form-control" id="rainfall" min="0" max="300" step="0.1" required>
        </div>

        <button type="button" class="btn btn-primary" onclick="getPrediction(document.getElementById('prediction-form'))">
  Predict
</button>
    </form>

    <div class="mt-3 text-center">
        <h4>Prediction Result:</h4>
        <p id="result" class="fw-bold text-success"></p>
    </div>
</div>

<script>
  async function getPrediction(form) {
    // Force HTML5 validation (min/max/required/etc.)
    if (!form.reportValidity()) {
      return; // stops here and shows the browser message
    }

    let N = document.getElementById("N").value;
    let P = document.getElementById("P").value;
    let K = document.getElementById("K").value;

    let temperature = document.getElementById("temperature").value;
    let humidity = document.getElementById("humidity").value;
    let ph = document.getElementById("ph").value;
    let rainfall = document.getElementById("rainfall").value;

    let response = await fetch("/predict", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({
        N: parseFloat(N),
        P: parseFloat(P),
        K: parseFloat(K),
        temperature: parseFloat(temperature),
        humidity: parseFloat(humidity),
        ph: parseFloat(ph),
        rainfall: parseFloat(rainfall)
      })
    });

        let result = await response.json();
        console.log(result);

        if (result.top_3_crops && result.probabilities) {
            document.getElementById("result").innerText =
                `Top 3 predicted crops:
1. ${result.top_3_crops[0]} (Probability: ${result.probabilities[0].toFixed(4)})
2. ${result.top_3_crops[1]} (Probability: ${result.probabilities[1].toFixed(4)})
3. ${result.top_3_crops[2]} (Probability: ${result.probabilities[2].toFixed(4)})`;
        } else if (result.error) {
            document.getElementById("result").innerText = `Error: ${result.error}`;
        } else {
            document.getElementById("result").innerText = "Prediction error. Check console.";
        }
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
