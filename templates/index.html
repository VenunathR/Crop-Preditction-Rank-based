<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Crop Prediction</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
        }
        .container {
            max-width: 600px;
            margin-top: 50px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #007bff;
            text-align: center;
        }
        .btn-primary {
            width: 100%;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Crop Prediction</h1>
    <form id="prediction-form">
        <div class="mb-3">
            <label for="temperature" class="form-label">Temperature (°C)</label>
            <input type="number" class="form-control" id="temperature" required>
        </div>
        <div class="mb-3">
            <label for="humidity" class="form-label">Humidity (%)</label>
            <input type="number" class="form-control" id="humidity" required>
        </div>
        <div class="mb-3">
            <label for="ph" class="form-label">Soil pH</label>
            <input type="number" class="form-control" id="ph" required>
        </div>
        <div class="mb-3">
            <label for="rainfall" class="form-label">Rainfall (mm)</label>
            <input type="number" class="form-control" id="rainfall" required>
        </div>
        <button type="button" class="btn btn-primary" onclick="getPrediction()">Predict</button>
    </form>
    <div class="mt-3 text-center">
        <h4>Prediction Result:</h4>
        <p id="result" class="fw-bold text-success"></p>
    </div>
</div>

<script>
    async function getPrediction() {
        let temperature = document.getElementById("temperature").value;
        let humidity = document.getElementById("humidity").value;
        let ph = document.getElementById("ph").value;
        let rainfall = document.getElementById("rainfall").value;
    
        let response = await fetch("/predict", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                temperature: parseFloat(temperature),
                humidity: parseFloat(humidity),
                ph: parseFloat(ph),
                rainfall: parseFloat(rainfall)
            })
        });
    
        let result = await response.json();
        console.log(result);  // Debugging line to check response
    
        if (result.top_3_crops && result.probabilities) {
            document.getElementById("result").innerText = `Top 3 predicted crops: 
            1. ${result.top_3_crops[0]} (Probability: ${result.probabilities[0]})
            2. ${result.top_3_crops[1]} (Probability: ${result.probabilities[1]})
            3. ${result.top_3_crops[2]} (Probability: ${result.probabilities[2]})`;
        } else {
            document.getElementById("result").innerText = "Prediction error. Check console.";
        }
    }
    
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
